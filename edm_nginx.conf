server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/edm/frontend;
    index index.html;

    client_max_body_size 20M;

    # API -> Node backend (pm2, port 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Pre-generated report HTML trees (single copy under /var/www/edm/reports)
    location /report-files/ {
        alias /var/www/edm/reports/;
        autoindex off;
    }
    location /Assembly_Reports/ {
        alias /var/www/edm/reports/Assembly_Reports/;
    }
    location /Booth_Reports/ {
        alias /var/www/edm/reports/Booth_Reports/;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
